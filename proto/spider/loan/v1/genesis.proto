syntax = "proto3";

package spider.loan.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "spider/loan/v1/loan.proto";
import "spider/loan/v1/params.proto";

option go_package = "spider/x/loan/types";

// GenesisState defines the loan module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Loan loan_map = 2 [(gogoproto.nullable) = false];
}
