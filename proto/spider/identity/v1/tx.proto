syntax = "proto3";

package spider.identity.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "spider/identity/v1/params.proto";

option go_package = "spider/x/identity/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // CreateIdentity defines the CreateIdentity RPC.
  rpc CreateIdentity(MsgCreateIdentity) returns (MsgCreateIdentityResponse);

  // UpdateIdentity defines the UpdateIdentity RPC.
  rpc UpdateIdentity(MsgUpdateIdentity) returns (MsgUpdateIdentityResponse);

  // DeleteIdentity defines the DeleteIdentity RPC.
  rpc DeleteIdentity(MsgDeleteIdentity) returns (MsgDeleteIdentityResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "spider/x/identity/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgCreateIdentity defines the MsgCreateIdentity message.
message MsgCreateIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string uid = 2;
  string owner = 3;
  bytes idkey = 4;
  bytes msgkey = 5;
}

// MsgCreateIdentityResponse defines the MsgCreateIdentityResponse message.
message MsgCreateIdentityResponse {}

// MsgUpdateIdentity defines the MsgUpdateIdentity message.
message MsgUpdateIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string uid = 2;
  string owner = 3;
  bytes idkey = 4;
  bytes msgkey = 5;
}

// MsgUpdateIdentityResponse defines the MsgUpdateIdentityResponse message.
message MsgUpdateIdentityResponse {}

// MsgDeleteIdentity defines the MsgDeleteIdentity message.
message MsgDeleteIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string uid = 2;
}

// MsgDeleteIdentityResponse defines the MsgDeleteIdentityResponse message.
message MsgDeleteIdentityResponse {}
