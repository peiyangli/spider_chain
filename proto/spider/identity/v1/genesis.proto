syntax = "proto3";

package spider.identity.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "spider/identity/v1/identity.proto";
import "spider/identity/v1/params.proto";

option go_package = "spider/x/identity/types";

// GenesisState defines the identity module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Identity identity_map = 2 [(gogoproto.nullable) = false];
}
