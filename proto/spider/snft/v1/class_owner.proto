syntax = "proto3";
package spider.snft.v1;

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "spider/x/snft/types";

// ClassOwner defines the ClassOwner message.
message ClassOwner {
  string class_id = 1;
  string pending_owner = 2;
  cosmos.base.v1beta1.Coin creation_fee = 3 [(gogoproto.nullable) = false];
  string owner = 4;
}
