syntax = "proto3";
package spider.snft.v1;

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "spider/x/snft/types";

// ClassNamespace defines the ClassNamespace message.
message ClassNamespace {
  string namespace = 1;
  cosmos.base.v1beta1.Coin creation_fee = 2 [(gogoproto.nullable) = false];
  string creator = 3;
}
