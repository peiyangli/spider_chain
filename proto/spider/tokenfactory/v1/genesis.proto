syntax = "proto3";

package spider.tokenfactory.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "spider/tokenfactory/v1/denom.proto";
import "spider/tokenfactory/v1/params.proto";

option go_package = "spider/x/tokenfactory/types";

// GenesisState defines the tokenfactory module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Denom denom_map = 2 [(gogoproto.nullable) = false];
}
