syntax = "proto3";
package spider.tokenfactory.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "spider/x/tokenfactory/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "spider/x/tokenfactory/Params";
  option (gogoproto.equal) = true;

  cosmos.base.v1beta1.Coin creation_fee = 3 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
