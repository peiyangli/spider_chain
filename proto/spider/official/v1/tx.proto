syntax = "proto3";

package spider.official.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "spider/official/v1/params.proto";

option go_package = "spider/x/official/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // CreateOperator defines the CreateOperator RPC.
  rpc CreateOperator(MsgCreateOperator) returns (MsgCreateOperatorResponse);

  // UpdateOperator defines the UpdateOperator RPC.
  rpc UpdateOperator(MsgUpdateOperator) returns (MsgUpdateOperatorResponse);

  // DeleteOperator defines the DeleteOperator RPC.
  rpc DeleteOperator(MsgDeleteOperator) returns (MsgDeleteOperatorResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "spider/x/official/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgCreateOperator defines the MsgCreateOperator message.
message MsgCreateOperator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string address = 2;
  string module = 3;
  string name = 4;
  uint64 role = 5;
  uint64 permissions = 6;
}

// MsgCreateOperatorResponse defines the MsgCreateOperatorResponse message.
message MsgCreateOperatorResponse {}

// MsgUpdateOperator defines the MsgUpdateOperator message.
message MsgUpdateOperator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string address = 2;
  string module = 3;
  string name = 4;
  uint64 role = 5;
  uint64 permissions = 6;
}

// MsgUpdateOperatorResponse defines the MsgUpdateOperatorResponse message.
message MsgUpdateOperatorResponse {}

// MsgDeleteOperator defines the MsgDeleteOperator message.
message MsgDeleteOperator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string address = 2;
}

// MsgDeleteOperatorResponse defines the MsgDeleteOperatorResponse message.
message MsgDeleteOperatorResponse {}
