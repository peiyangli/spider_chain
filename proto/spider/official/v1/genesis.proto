syntax = "proto3";

package spider.official.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "spider/official/v1/operator.proto";
import "spider/official/v1/params.proto";

option go_package = "spider/x/official/types";

// GenesisState defines the official module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Operator operator_map = 2 [(gogoproto.nullable) = false];
}
